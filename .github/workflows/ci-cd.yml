name: CI/CD Pipeline - Devops

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/practica-devops

jobs:
  # ===== JOB 1: TESTING =====
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v3
    
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: 📦 Instalar dependencias
      run: npm install
    
    - name: ✅ Ejecutar pruebas unitarias
      run: npm test -- --coverage
      env:
        NODE_ENV: test
    
    - name: 📊 Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/coverage-final.json
        flags: unittests

  # ===== JOB 2: BUILD & PUSH DOCKER =====
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v3
    
    - name: 🔑 Login en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: 🏗️ Build y Push imagen Docker
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/practica-devops:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/practica-devops:latest
    
    - name: 📢 Mostrar imagen enviada
      run: echo "✅ Imagen Docker enviada: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/practica-devops:latest"

  # ===== JOB 3: DEPLOY A PRODUCCIÓN =====
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v3
    
    - name: 🚀 Deploy a Render
      run: |
        curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}
      env:
        SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        DEPLOY_KEY: ${{ secrets.RENDER_DEPLOY_KEY }}
    
    - name: ✅ Deploy completado
      run: echo "🎉 Aplicación deployada en producción"

  # ===== JOB 4: NOTIFICACIÓN (Opcional) =====
  notify:
    needs: [test, build-and-push, deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 📧 Status del Pipeline
      run: |
        echo "Pipeline Status: ${{ job.status }}"
        echo "Commit: ${{ github.sha }}"
        echo "Branch: ${{ github.ref }}"